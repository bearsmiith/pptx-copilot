<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>설정 — pptx copilot</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font:15px system-ui,sans-serif; color:#1f2a44; background:#f4f6fa; }
  header { padding:11px 18px; background:#1f2a44; color:#fff; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  header h1 { font-size:16px; margin:0; font-weight:600; }
  nav a { padding:5px 12px; border-radius:7px 7px 0 0; font-size:13px; text-decoration:none; }
  main { max-width:760px; margin:24px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid #d7dbe3; border-radius:12px; padding:18px 20px; margin-bottom:18px; }
  .card h2 { font-size:15px; margin:0 0 4px; }
  .card p.hint { margin:0 0 14px; color:#5b6472; font-size:13px; }
  label { display:block; font-size:12px; color:#5b6472; margin:10px 0 4px; }
  input[type=text], input[type=password], select { width:100%; font:13.5px system-ui; border:1px solid #d7dbe3; border-radius:8px; padding:8px 10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row { display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  button { font:600 13.5px system-ui; padding:8px 14px; border:0; border-radius:8px; background:#2f6fed; color:#fff; cursor:pointer; }
  button.sec { background:#e8ecf4; color:#1f2a44; }
  button.ok { background:#2e9e5b; }
  .ep { border:1px solid #e3e7ee; border-radius:9px; padding:14px; margin-bottom:12px; background:#fafbfd; }
  .ep h3 { margin:0 0 8px; font-size:14px; }
  .badge { font-size:11.5px; padding:2px 9px; border-radius:10px; }
  .badge.on { background:#2e9e5b; color:#fff; }
  .badge.off { background:#c3cad4; color:#fff; }
  .test-out { font-size:12.5px; margin-top:6px; }
  .test-out.ok { color:#2e6e47; } .test-out.err { color:#b4400e; }
  #status { font-size:13px; color:#5b6472; min-height:18px; margin-top:6px; }
  .stage-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .muted { color:#8a93a0; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>pptx copilot</h1>
  <nav style="display:flex;gap:2px;margin-left:6px">
    <a href="/" style="background:#2b3446;color:#9fb3d9">단면도</a>
    <a href="/slides" style="background:#2b3446;color:#9fb3d9">슬라이드</a>
    <a href="/settings" style="background:#2f6fed;color:#fff;font-weight:600">설정</a>
  </nav>
</header>
<main>
  <div class="card">
    <h2>활성 모델</h2>
    <p class="hint">단면도·슬라이드 생성에 사용할 기본 백엔드. 아래에서 엔드포인트를 먼저 설정한 뒤 선택하세요.</p>
    <select id="active">
      <option value="haiku">Haiku (Claude Code CLI · 기본)</option>
      <option value="qwen27b">Qwen3.6-27B (엔드포인트)</option>
      <option value="qwen122b">Qwen3.5-122B (엔드포인트)</option>
      <option value="mock">Mock (모델 없음, 테스트)</option>
    </select>
    <details style="margin-top:12px">
      <summary class="muted" style="cursor:pointer">고급: 단계별 모델 (선택)</summary>
      <p class="hint" style="margin-top:8px">비워두면 활성 모델을 사용. 큰 모델로 계획, 작은 모델로 채우기 식 조합 가능.</p>
      <div class="stage-grid">
        <div><label>PLAN (계획/판단)</label><select id="st_plan"></select></div>
        <div><label>FIGURE (그림 생성)</label><select id="st_figure"></select></div>
        <div><label>FILL (편집/채우기)</label><select id="st_fill"></select></div>
      </div>
    </details>
  </div>

  <div class="card">
    <h2>엔드포인트 (URL + 모델명)</h2>
    <p class="hint">vLLM 등 OpenAI 호환 엔드포인트. base_url은 보통 <code>http://호스트:포트/v1</code> 형태.</p>
    <div id="endpoints"></div>
  </div>

  <div class="row">
    <button class="ok" id="save">저장</button>
    <span id="status"></span>
  </div>
</main>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
let CFG=null;
const EPS=[["qwen27b","Qwen3.6-27B"],["qwen122b","Qwen3.5-122B"]];
const JMODES=["guided_json","json_schema","json_object"];

function stageOptions(sel){
  const opts=[["","(활성 모델 사용)"],["haiku","Haiku"],["qwen27b","Qwen3.6-27B"],["qwen122b","Qwen3.5-122B"],["mock","Mock"]];
  return opts.map(([v,l])=>`<option value="${v}" ${v===sel?"selected":""}>${l}</option>`).join("");
}

function render(){
  $("#active").value=CFG.active;
  const st=CFG.stage||{};
  $("#st_plan").innerHTML=stageOptions(st.plan||"");
  $("#st_figure").innerHTML=stageOptions(st.figure||"");
  $("#st_fill").innerHTML=stageOptions(st.fill||"");
  const box=$("#endpoints"); box.innerHTML="";
  for(const [id,label] of EPS){
    const ep=(CFG.endpoints||{})[id]||{};
    const on=CFG.active===id||[st.plan,st.figure,st.fill].includes(id);
    const div=document.createElement("div"); div.className="ep";
    div.innerHTML=`<h3>${label} <span class="badge ${on?'on':'off'}">${on?'사용중':'미사용'}</span></h3>
      <label>base_url</label><input type="text" id="${id}_url" value="${esc(ep.base_url||"")}" placeholder="http://192.168.0.10:8000/v1"/>
      <div class="grid2">
        <div><label>모델명</label><input type="text" id="${id}_model" value="${esc(ep.model||"")}" placeholder="qwen3.6-27b"/></div>
        <div><label>JSON 모드</label><select id="${id}_jm">${JMODES.map(j=>`<option ${j===(ep.json_mode||'guided_json')?'selected':''}>${j}</option>`).join("")}</select></div>
      </div>
      <label>API 키 (선택)</label><input type="password" id="${id}_key" placeholder="${ep.has_key?'●●● 저장됨 (변경 시에만 입력)':'없음'}"/>
      <div class="row"><button class="sec" data-test="${id}">연결 테스트</button><span class="test-out" id="${id}_test"></span></div>`;
    box.appendChild(div);
  }
  document.querySelectorAll("[data-test]").forEach(b=>b.onclick=()=>test(b.dataset.test));
}

function collect(){
  const endpoints={};
  for(const [id] of EPS){
    endpoints[id]={base_url:$(`#${id}_url`).value.trim(), model:$(`#${id}_model`).value.trim(),
                   json_mode:$(`#${id}_jm`).value};
    const key=$(`#${id}_key`).value; if(key) endpoints[id].api_key=key;
  }
  return {active:$("#active").value, endpoints,
          stage:{plan:$("#st_plan").value, figure:$("#st_figure").value, fill:$("#st_fill").value}};
}

async function test(id){
  const out=$(`#${id}_test`); out.className="test-out"; out.textContent="테스트 중…";
  try{
    const r=await fetch("/api/config/test",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({base_url:$(`#${id}_url`).value.trim(), model:$(`#${id}_model`).value.trim(), api_key:$(`#${id}_key`).value})});
    const d=await r.json();
    if(d.ok){ out.className="test-out ok"; out.textContent=`✓ 연결됨 (${d.latency}s, 응답: "${d.reply}")`; }
    else { out.className="test-out err"; out.textContent="✗ "+d.error; }
  }catch(e){ out.className="test-out err"; out.textContent="✗ "+e.message; }
}

$("#save").onclick=async()=>{
  $("#status").textContent="저장 중…";
  try{
    const r=await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(collect())});
    if(!r.ok) throw new Error((await r.text()).slice(0,200));
    CFG=await r.json(); render();
    $("#status").textContent="저장됨 — 즉시 적용됩니다 (재시작 불필요).";
  }catch(e){ $("#status").textContent="실패: "+e.message; }
};

(async()=>{ CFG=await (await fetch("/api/config")).json(); render(); })();
</script>
</body>
</html>
